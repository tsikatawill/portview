name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "dist/*.dmg dist/*.zip dist/latest-mac.yml dist/*.blockmap"
          - os: windows-latest
            artifact_glob: "dist/*.exe dist/latest.yml dist/*.blockmap"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "v${VERSION}" != "${{ github.ref_name }}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${VERSION}"
            exit 1
          fi

      - name: Build and package
        run: npm run dist

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" ${{ matrix.artifact_glob }} --clobber
